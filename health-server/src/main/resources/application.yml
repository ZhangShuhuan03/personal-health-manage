server:
  port: 8080

spring:
  application:
    name: personal-health-manage

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/health_manage?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: aa

  ai:
    openai:
      api-key: sk-ws-H.EMHYDYR.jOt8.MEQCIEf2VKU2Y0_DFIxls71u3EG-rDUNUOI5D9Hi5CBJoh12AiB7pBt1WK9BwvUBVHQNutGBsFG3zQzM2Y04WgGtcqjnqg
      # 不要以 /v1 结尾，Spring AI 会自动拼接 /v1/chat/completions
      base-url: https://ws-rw2noxxx5z3a2omo.cn-beijing.maas.aliyuncs.com/compatible-mode
      chat:
        options:
          model: qwen-turbo
          temperature: 0.3

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.health.manage.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    com.health.manage: debug
